<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות למערכת</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
<div class="main-wrapper">
    <div class="login-container">
        
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="username" placeholder=" שם משתמש" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder=" סיסמה" required>
            </div>

            <button type="submit" class="login-button">התחבר</button>
        </form>

    </div>
 
    </div>
    <div class="register-link-container">
            <p>עדיין אין לך משתמש?</p>
            <a href="register.html" class="register-link">הרשמה</a>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
